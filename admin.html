<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - GAME HUB</title>

    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
            }
        }
    </script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #0b0e1a; color: #fff; padding: 20px; }
        .container { max-width: 1100px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; flex-wrap: wrap; }
        .header h1 { font-size: 2rem; font-weight: 800; background: linear-gradient(135deg, #f5af19, #f12711); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .card { background: #1a1f2f; border-radius: 20px; padding: 25px; margin-bottom: 20px; }
        .card-title { font-size: 1.3rem; font-weight: 700; margin-bottom: 15px; color: #f5af19; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px 15px; border-bottom: 1px solid #333; text-align: left; }
        th { color: #8899bb; font-weight: 600; font-size: 0.85rem; text-transform: uppercase; }
        .password-cell { font-family: monospace; word-break: break-all; background: rgba(255,255,255,0.05); padding: 4px 8px; border-radius: 4px; }
        .btn { padding: 8px 16px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; }
        .btn-danger { background: #ff6b6b; color: #fff; }
        .btn-danger:hover { background: #e55555; }
        .logout-btn { padding: 10px 24px; background: #ff6b6b; color: #fff; border: none; border-radius: 30px; font-weight: 700; cursor: pointer; }
        .error-msg { color: #ff6b6b; text-align: center; padding: 20px; }
        @media (max-width: 700px) {
            table { font-size: 0.8rem; }
            th, td { padding: 8px 10px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎮 Admin Panel - GAME HUB</h1>
            <div>
                <span class="user-info" id="userInfo" style="color:#8899bb;">Login sebagai: <span style="color:#f5af19;">Loading...</span></span>
                <button class="logout-btn" id="logoutBtn">Keluar</button>
            </div>
        </div>

        <div class="card">
            <div class="card-title">📋 Daftar User</div>
            <table>
                <thead>
                    <tr><th>Email</th><th>Username</th><th>Password (Plaintext)</th><th>Dibuat</th></tr>
                </thead>
                <tbody id="userTableBody"></tbody>
            </table>
            <div id="emptyState" style="text-align:center; color:#667799; padding:40px 0; display:none;">Belum ada user.</div>
        </div>

        <div class="card">
            <div class="card-title">📊 Statistik</div>
            <span id="totalUsers">Total user: 0</span>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from 'firebase/app';
        import { getAuth, signOut, onAuthStateChanged } from 'firebase/auth';
        import { getFirestore, collection, getDocs, query, orderBy } from 'firebase/firestore';

        const firebaseConfig = {
            apiKey: 'AIzaSyB1uODnjvbrLlaun1pG7DYbztqmtUUM7s8',
            authDomain: 'invest-7de15.firebaseapp.com',
            projectId: 'invest-7de15',
            storageBucket: 'invest-7de15.firebasestorage.app',
            messagingSenderId: '161851077496',
            appId: '1:161851077496:web:84559ac26f6c8b6923ce8d'
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const userInfo = document.querySelector('#userInfo span');
        const logoutBtn = document.getElementById('logoutBtn');
        const userTableBody = document.getElementById('userTableBody');
        const emptyState = document.getElementById('emptyState');
        const totalUsersSpan = document.getElementById('totalUsers');

        async function loadUsers() {
            try {
                const usersRef = collection(db, 'users');
                const q = query(usersRef, orderBy('createdAt', 'desc'));
                const snapshot = await getDocs(q);

                userTableBody.innerHTML = '';
                let count = 0;

                if (snapshot.empty) {
                    emptyState.style.display = 'block';
                    totalUsersSpan.textContent = 'Total user: 0';
                    return;
                }

                emptyState.style.display = 'none';
                snapshot.forEach(doc => {
                    count++;
                    const data = doc.data();
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${data.email || '-'}</td>
                        <td>${data.username || '-'}</td>
                        <td><span class="password-cell">${data.passwordPlain || '-'}</span></td>
                        <td>${data.createdAt ? new Date(data.createdAt.seconds * 1000).toLocaleString() : '-'}</td>
                    `;
                    userTableBody.appendChild(tr);
                });
                totalUsersSpan.textContent = `Total user: ${count}`;
            } catch (error) {
                console.error('Gagal load user:', error);
                userTableBody.innerHTML = `<tr><td colspan="4" style="text-align:center; color:#ff6b6b;">❌ Gagal memuat data</td></tr>`;
            }
        }

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                if (user.email !== 'kopexx11@gamehub.com') {
                    // Bukan admin, logout & redirect ke index
                    await signOut(auth);
                    window.location.href = 'index.html';
                } else {
                    userInfo.textContent = user.email;
                    loadUsers();
                }
            } else {
                window.location.href = 'index.html';
            }
        });

        logoutBtn.addEventListener('click', async () => {
            await signOut(auth);
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
