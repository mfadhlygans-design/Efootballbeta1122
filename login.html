<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - GAME HUB</title>
    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
            }
        }
    </script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins', sans-serif; }
        body { background:#0a0e17; display:flex; align-items:center; justify-content:center; min-height:100vh; padding:20px; }
        .login-card {
            max-width:420px;
            width:100%;
            background:rgba(14,20,34,0.8);
            backdrop-filter:blur(24px);
            border-radius:40px;
            padding:32px 28px;
            border:1px solid rgba(255,255,255,0.04);
            box-shadow:0 30px 80px rgba(0,0,0,0.7);
        }
        .header { text-align:center; margin-bottom:24px; }
        .header h1 { font-size:2rem; font-weight:800; background:linear-gradient(135deg,#ff00ff,#00ffff); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
        .header p { color:#8899bb; font-size:0.85rem; }
        .form-group { margin-bottom:14px; }
        .form-group label { display:block; font-size:0.8rem; color:#8899bb; margin-bottom:4px; }
        .form-group input { width:100%; padding:12px 16px; background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.05); border-radius:12px; color:#fff; font-size:1rem; outline:none; }
        .form-group input:focus { border-color:#ff00ff; }
        .action-btn { width:100%; padding:14px; background:linear-gradient(135deg,#ff00ff,#00ffff); border:none; border-radius:30px; color:#0a0e17; font-weight:700; font-size:1.1rem; cursor:pointer; transition:0.25s; margin-top:6px; }
        .action-btn:hover { transform:scale(1.02); }
        .action-btn:disabled { opacity:0.5; cursor:not-allowed; }
        .error-msg { color:#ff6b6b; font-size:0.85rem; margin-top:6px; text-align:center; }
        .footer { text-align:center; margin-top:16px; font-size:0.85rem; color:#8899bb; }
        .footer a { color:#ff00ff; text-decoration:none; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="header">
            <h1>🔐 Login</h1>
            <p>Masuk ke GAME HUB</p>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label>📧 Email</label>
                <input type="email" id="loginEmail" placeholder="contoh@email.com" required />
            </div>
            <div class="form-group">
                <label>🔑 Password</label>
                <input type="password" id="loginPassword" placeholder="••••••••" required />
            </div>
            <div id="loginError" class="error-msg" style="display:none;"></div>
            <button type="submit" class="action-btn" id="submitLoginBtn">Masuk</button>
        </form>

        <div class="footer">
            Belum punya akun? <a href="register.html">Daftar di sini</a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from 'firebase/app';
        import { getAuth, signInWithEmailAndPassword } from 'firebase/auth';

        const firebaseConfig = {
            apiKey: 'AIzaSyB1uODnjvbrLlaun1pG7DYbztqmtUUM7s8',
            authDomain: 'invest-7de15.firebaseapp.com',
            projectId: 'invest-7de15',
            storageBucket: 'invest-7de15.firebasestorage.app',
            messagingSenderId: '161851077496',
            appId: '1:161851077496:web:84559ac26f6c8b6923ce8d'
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const loginForm = document.getElementById('loginForm');
        const loginEmail = document.getElementById('loginEmail');
        const loginPassword = document.getElementById('loginPassword');
        const loginError = document.getElementById('loginError');
        const submitLoginBtn = document.getElementById('submitLoginBtn');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = loginEmail.value.trim();
            const password = loginPassword.value;

            loginError.style.display = 'none';
            submitLoginBtn.disabled = true;
            submitLoginBtn.textContent = '⏳ Memverifikasi...';

            try {
                await signInWithEmailAndPassword(auth, email, password);
                submitLoginBtn.textContent = '✅ Berhasil!';
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 800);
            } catch (error) {
                let msg = 'Login gagal: ';
                if (error.code === 'auth/user-not-found') msg += 'Email tidak ditemukan.';
                else if (error.code === 'auth/wrong-password') msg += 'Password salah.';
                else if (error.code === 'auth/invalid-email') msg += 'Email tidak valid.';
                else msg += error.message;
                loginError.textContent = msg;
                loginError.style.display = 'block';
                submitLoginBtn.disabled = false;
                submitLoginBtn.textContent = 'Masuk';
            }
        });
    </script>
</body>
</html>
