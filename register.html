<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register - GAME HUB</title>

    <!-- Firebase Modular Import Map -->
    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
            }
        }
    </script>

    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins', sans-serif; }
        body { background:#0a0e17; display:flex; align-items:center; justify-content:center; min-height:100vh; padding:20px; }
        .register-card {
            max-width:420px;
            width:100%;
            background:rgba(14,20,34,0.8);
            backdrop-filter:blur(24px);
            border-radius:40px;
            padding:32px 28px;
            border:1px solid rgba(255,255,255,0.04);
            box-shadow:0 30px 80px rgba(0,0,0,0.7);
        }
        .header { text-align:center; margin-bottom:24px; }
        .header h1 { font-size:2rem; font-weight:800; background:linear-gradient(135deg,#ff00ff,#00ffff); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
        .header p { color:#8899bb; font-size:0.85rem; }
        .form-group { margin-bottom:14px; }
        .form-group label { display:block; font-size:0.8rem; color:#8899bb; margin-bottom:4px; }
        .form-group input { width:100%; padding:12px 16px; background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.05); border-radius:12px; color:#fff; font-size:1rem; outline:none; }
        .form-group input:focus { border-color:#ff00ff; }
        .action-btn { width:100%; padding:14px; background:linear-gradient(135deg,#ff00ff,#00ffff); border:none; border-radius:30px; color:#0a0e17; font-weight:700; font-size:1.1rem; cursor:pointer; transition:0.25s; margin-top:6px; }
        .action-btn:hover { transform:scale(1.02); }
        .action-btn:disabled { opacity:0.5; cursor:not-allowed; }
        .error-msg { color:#ff6b6b; font-size:0.85rem; margin-top:6px; text-align:center; }
        .success-msg { color:#4ecdc4; font-size:0.85rem; margin-top:6px; text-align:center; }
        .footer { text-align:center; margin-top:16px; font-size:0.85rem; color:#8899bb; }
        .footer a { color:#ff00ff; text-decoration:none; }
    </style>
</head>
<body>
    <div class="register-card">
        <div class="header">
            <h1>📝 Daftar</h1>
            <p>Buat akun GAME HUB</p>
        </div>

        <form id="registerForm">
            <div class="form-group">
                <label>📧 Email</label>
                <input type="email" id="registerEmail" placeholder="contoh@email.com" required />
            </div>
            <div class="form-group">
                <label>🔑 Password (min 6)</label>
                <input type="password" id="registerPassword" placeholder="••••••••" required />
            </div>
            <div class="form-group">
                <label>✅ Konfirmasi Password</label>
                <input type="password" id="registerConfirmPassword" placeholder="••••••••" required />
            </div>
            <div id="registerError" class="error-msg" style="display:none;"></div>
            <div id="registerSuccess" class="success-msg" style="display:none;"></div>
            <button type="submit" class="action-btn" id="submitRegisterBtn">Daftar</button>
        </form>

        <div class="footer">
            Sudah punya akun? <a href="login.html">Login di sini</a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from 'firebase/app';
        import { getAuth, createUserWithEmailAndPassword } from 'firebase/auth';
        import { getFirestore, doc, setDoc, serverTimestamp } from 'firebase/firestore';

        const firebaseConfig = {
            apiKey: 'AIzaSyB1uODnjvbrLlaun1pG7DYbztqmtUUM7s8',
            authDomain: 'invest-7de15.firebaseapp.com',
            projectId: 'invest-7de15',
            storageBucket: 'invest-7de15.firebasestorage.app',
            messagingSenderId: '161851077496',
            appId: '1:161851077496:web:84559ac26f6c8b6923ce8d'
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- ELEMEN DOM ---
        const registerForm = document.getElementById('registerForm');
        const registerEmail = document.getElementById('registerEmail');
        const registerPassword = document.getElementById('registerPassword');
        const registerConfirmPassword = document.getElementById('registerConfirmPassword');
        const registerError = document.getElementById('registerError');
        const registerSuccess = document.getElementById('registerSuccess');
        const submitRegisterBtn = document.getElementById('submitRegisterBtn');

        // --- REGISTER FORM ---
        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = registerEmail.value.trim();
            const password = registerPassword.value;
            const confirm = registerConfirmPassword.value;

            if (password !== confirm) {
                registerError.textContent = 'Konfirmasi password tidak cocok.';
                registerError.style.display = 'block';
                return;
            }

            submitRegisterBtn.disabled = true;
            submitRegisterBtn.textContent = '⏳ Mendaftarkan...';

            try {
                // Buat akun di Firebase Auth
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                // Simpan data ke Firestore
                await setDoc(doc(db, 'users', user.uid), {
                    email: user.email,
                    username: '',
                    passwordPlain: '',
                    createdAt: serverTimestamp()
                });

                registerSuccess.textContent = '✅ Akun berhasil dibuat!';
                registerSuccess.style.display = 'block';
                submitRegisterBtn.textContent = '✅ Sukses!';

                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);
            } catch (error) {
                let msg = 'Gagal daftar: ';
                if (error.code === 'auth/email-already-in-use') msg += 'Email sudah terdaftar.';
                else msg += error.message;
                registerError.textContent = msg;
                registerError.style.display = 'block';
                submitRegisterBtn.disabled = false;
                submitRegisterBtn.textContent = 'Daftar';
            }
        });
    </script>
</body>
</html>
